  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg:#0b0b0c;
      --card:#121214;
      --text:#ffffff;
      --muted:#9ca3af;
      --border:#232326;
      --accent:#4ade80;
    }

    body.light{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111111;
      --muted:#555;
      --border:#dddddd;
    }

    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      transition:0.3s ease;
    }

    .card{
      width:100%;
      max-width:420px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:35px 28px;
      text-align:center;
      transition:0.3s ease;
      box-shadow:0 0 40px rgba(0,0,0,0.15);
    }

    .top{
      display:flex;
      justify-content:flex-end;
      margin-bottom:15px;
    }

    .theme-btn{
      width:42px;
      height:42px;
      border:none;
      border-radius:12px;
      background:transparent;
      border:1px solid var(--border);
      color:var(--text);
      cursor:pointer;
      font-size:18px;
      transition:0.3s ease;
    }

    .theme-btn:hover{
      border-color:var(--accent);
      color:var(--accent);
    }

    .profile{
      width:145px;
      height:145px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid var(--border);
      margin-bottom:20px;
    }

    h1{
      font-size:30px;
      font-weight:700;
      margin-bottom:8px;
    }

    .role{
      color:var(--accent);
      font-size:15px;
      font-weight:500;
      margin-bottom:18px;
    }

    .desc{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      margin-bottom:28px;
    }

    .links{
      display:flex;
      justify-content:center;
      gap:14px;
    }

    .link{
      width:48px;
      height:48px;
      border-radius:14px;
      border:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--text);
      text-decoration:none;
      transition:0.25s ease;
    }

    .link:hover{
      transform:translateY(-4px);
      border-color:var(--accent);
      color:var(--accent);
    }

    .link svg{
      width:22px;
      height:22px;
      fill:currentColor;
    }

  </style>
</head>

  <script>
    function toggleTheme(){
      document.body.classList.toggle("light");

      const btn = document.getElementById("themeBtn");

      if(document.body.classList.contains("light")){
        btn.innerHTML = "☀";
      }else{
        btn.innerHTML = "☾";
      }
    }
